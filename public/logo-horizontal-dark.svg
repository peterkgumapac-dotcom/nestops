<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="200" fill="#0a0e17"/>

  <!-- Circle container -->
  <circle cx="100" cy="100" r="80" fill="#0e1e1e" stroke="#1a8a7a" stroke-width="2.5"/>

  <!-- A letterform - wide -->
