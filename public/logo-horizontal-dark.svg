  <!-- Wordmark: Stay -->
  <text x="430" y="105" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="700" font-size="56" letter-spacing="-2" fill="#1a8a7a">Stay</text>

  <!-- Tagline -->
  <text x="212" y="135" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="500" font-size="16" letter-spacing="5" fill="#1a8a7a" opacity="0.5">OPERATIONS PLATFORM</text>
